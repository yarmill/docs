name: Docs site CI

# Mirrors yarmill/web's ci.yml (lint + type-check + build) on every PR/commit
# that touches the site, adapted for this repo's site/ subdir and npm. (Our
# linter is ESLint rather than Biome.)

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/docs-site-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/docs-site-ci.yml'

concurrency:
  group: docs-site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
